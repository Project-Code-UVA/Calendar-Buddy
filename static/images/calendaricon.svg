<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Calendar body -->
  <rect x="6" y="13" width="52" height="45" rx="7" fill="white" stroke="#0d7377" stroke-width="2.5"/>
  <!-- Header fill -->
  <rect x="6" y="13" width="52" height="17" rx="7" fill="#0d7377"/>
  <rect x="6" y="23" width="52" height="7" fill="#0d7377"/>
  <!-- Binding rings -->
  <rect x="19" y="7" width="6" height="13" rx="3" fill="white" stroke="#0d7377" stroke-width="2"/>
  <rect x="39" y="7" width="6" height="13" rx="3" fill="white" stroke="#0d7377" stroke-width="2"/>
  <!-- Day grid dots -->
  <circle cx="19" cy="39" r="2.5" fill="#0d7377" opacity="0.4"/>
  <circle cx="32" cy="39" r="2.5" fill="#0d7377" opacity="0.4"/>
  <circle cx="45" cy="39" r="2.5" fill="#0d7377" opacity="0.4"/>
  <circle cx="19" cy="50" r="2.5" fill="#0d7377" opacity="0.4"/>
  <!-- Highlighted day (today) -->
  <circle cx="32" cy="50" r="4" fill="#ea8c6f"/>
  <circle cx="45" cy="50" r="2.5" fill="#0d7377" opacity="0.4"/>
</svg>
